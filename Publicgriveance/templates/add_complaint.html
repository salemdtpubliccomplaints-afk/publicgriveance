<!DOCTYPE html>
<html>
<head>

<title>Add Complaint</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Add New Complaint</h2>

<a href="/" class="btn btn-secondary mb-3">

Back

</a>

<form action="/save" method="POST">

<div class="row">

<div class="col-md-6">

<label>Complaint Number</label>

<input
type="text"
name="complaint_no"
class="form-control"
required>

</div>

<div class="col-md-6">

<label>Citizen Name</label>

<input
type="text"
name="citizen_name"
class="form-control"
required>

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Mobile Number</label>

<input
type="text"
name="mobile"
class="form-control">

</div>

<div class="col-md-6">

<label>Ward Number</label>

<input
type="text"
name="ward_no"
class="form-control">

</div>
<div class="mb-3">
    <label>Division Number</label>

    <input
        type="text"
        name="division_no"
        class="form-control">
</div>

</div>

<br>

<label>Category</label>

<select
name="category"
class="form-control">

<option>New Road</option>
<option>Road Patch Work</option>
<option>Road Corner Safety Wall</option>
<option>New Drainage</option>
<option>Drainage Repair</option>
<option>Drainage Clean</option>
<option>Drainage Clean Remove</option>
<option>Garbage Collector Not Coming</option>
<option>Arrange Garbage Vehicle</option>
<option>Street Light Change</option>
<option>New Street Connection</option>
<option>Water Late</option>
<option>Water Turbid</option>
<option>Common Water Line Leak</option>
<option>Ground Motor Repair</option>
<option>Ground Motor Not Available</option>
<option>Ground Tank Damage</option>
<option>Ground Tank Tab Change</option>
<option>New Common Water Line</option>
<option>Street Dog Issue</option>
<option>EB Line Issue</option>
<option>New EB Connection</option>
<option>Power Cut</option>
<option>New EB Line</option>
<option>Others</option>

</select>

<br>

<label>Description</label>

<textarea
name="description"
class="form-control"
rows="5"></textarea>

<br>

<button
type="submit"
class="btn btn-success">

Submit Complaint

</button>

</form>

</div>

</body>
</html>
