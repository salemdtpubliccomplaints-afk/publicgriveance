<!DOCTYPE html>

<html>
<head>

<title>Add Complaint</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Public Grievance Registration</h2>

<a href="/" class="btn btn-secondary mb-3">
Back
</a>

<form action="/save" method="POST">

<div class="row">

<div class="col-md-4">
<label>Complaint Attender</label>
<input type="text" name="complaint_attender" class="form-control" required>
</div>

<div class="col-md-4">
<label>Complaint Date</label>
<input type="date" name="complaint_date" class="form-control" required>
</div>

<div class="col-md-4">
<label>Zonal Office</label>
<input type="text" name="zonal_office" class="form-control">
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<label>Petitioner Name</label>
<input type="text" name="petitioner_name" class="form-control" required>
</div>

<div class="col-md-6">
<label>Mobile Number</label>
<input type="text" name="mobile" class="form-control">
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<label>Petitioner Address</label>
<textarea name="petitioner_address" class="form-control"></textarea>
</div>

<div class="col-md-3">
<label>Ward Number</label>
<input type="text" name="ward_no" class="form-control">
</div>

<div class="col-md-3">
<label>Division Number</label>
<input type="text" name="division_no" class="form-control">
</div>

</div>

<br>

<label>Category</label>

<select name="category" class="form-control">

<option>New Road</option>
<option>Road Patch Work</option>
<option>Road Corner Safety Wall</option>
<option>New Drainage</option>
<option>Drainage Repair</option>
<option>Drainage Clean</option>
<option>Drainage Clean Remove</option>
<option>Garbage Collector Not Coming</option>
<option>Arrange Garbage Vehicle</option>
<option>Street Light Change</option>
<option>New Street Connection</option>
<option>Water Late</option>
<option>Water Turbid</option>
<option>Common Water Line Leak</option>
<option>Ground Motor Repair</option>
<option>Ground Motor Not Available</option>
<option>Ground Tank Damage</option>
<option>Ground Tank Tab Change</option>
<option>New Common Water Line</option>
<option>Street Dog Issue</option>
<option>EB Line Issue</option>
<option>New EB Connection</option>
<option>Power Cut</option>
<option>New EB Line</option>
<option>Others</option>

</select>

<br>

<label>Description</label>

<textarea
name="description"
class="form-control"
rows="4"></textarea>

<br>

<div class="row">

<div class="col-md-4">
<label>Ward Notification Status</label>
<select name="ward_notification_status" class="form-control">
<option>Pending</option>
<option>Informed</option>
<option>Completed</option>
</select>
</div>

<div class="col-md-4">
<label>Ward Representative</label>
<input type="text" name="ward_representative" class="form-control">
</div>

<div class="col-md-4">
<label>Response Details</label>
<input type="text" name="response_details" class="form-control">
</div>

</div>

<br>

<div class="row">

<div class="col-md-4">
<label>Informed To Department</label>
<input type="text" name="informed_to_department" class="form-control">
</div>

<div class="col-md-4">
<label>Initial Action Status</label>
<select name="inital_action_status" class="form-control">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>
</div>

<div class="col-md-4">
<label>Progress Update Status</label>
<select name="progress_update_status" class="form-control">
<option>Pending</option>
<option>In Progress</option>
<option>Completed</option>
</select>
</div>

</div>

<br>

<div class="row">

<div class="col-md-6">
<label>Final Resolution Status</label>
<select name="final_resolution_status" class="form-control">
<option>Open</option>
<option>Resolved</option>
<option>Closed</option>
</select>
</div>

<div class="col-md-6">
<label>Remarks & Notes</label>
<textarea name="remarks_notes" class="form-control"></textarea>
</div>

</div>

<br>

<button type="submit" class="btn btn-success">
Submit Complaint
</button>

</form>

</div>

</body>
</html>
