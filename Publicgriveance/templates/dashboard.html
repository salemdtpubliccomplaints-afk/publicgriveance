<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background:#f5f5f5;
        }

        .banner-container{
            width:100%;
            background:#fff;
            text-align:center;
            margin:0;
            padding:0;
        }

        .banner-image{
            width:100%;
            max-height:180px;
            object-fit:contain;
            display:block;
            margin:0 auto;
        }

        .title-section{
            text-align:center;
            background:#fff;
            padding:4px 10px;
            border-bottom:1px solid #e5e5e5;
        }

        .title-tamil{
            color:#7a0019;
            font-size:20px;
            font-weight:700;
            margin:0;
            line-height:1.2;
        }

        .title-english{
            color:#555;
            font-size:13px;
            margin-top:3px;
        }

        .dashboard-card{
            background:white;
            border-radius:15px;
            padding:25px;
            margin-top:20px;
            box-shadow:0px 3px 10px rgba(0,0,0,0.15);
        }

        .dashboard-title{
            color:#7a0019;
            font-weight:800;
        }

    </style>

</head>

<body>

    <div class="banner-container">

        <img
            src="{{ url_for('static', filename='images/banner.png') }}"
            class="banner-image"
            alt="Banner">

    </div>

    <div class="title-section">

        <div class="title-tamil">
            சேலம் தெற்கு (090) சட்ட மன்றத் தொகுதி - மக்கள் கோரிக்கைகள்
        </div>

        <div class="title-english">
            Public Complaint Monitoring & Tracking System
        </div>

    </div>

    <div class="container">

        <div class="dashboard-card text-center">

            <h2 class="dashboard-title">
                Public Grievance Dashboard
            </h2>

            <br>

            <a href="/" class="btn btn-secondary">
                Back
            </a>

        </div>

    </div>

</body>
</html>
