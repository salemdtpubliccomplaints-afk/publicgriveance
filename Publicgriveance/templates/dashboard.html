<!DOCTYPE html>
<html>
<head>

<title>Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Public Grievance Dashboard</h2>

<div class="mb-3">

<a href="/" class="btn btn-primary">
Complaints
</a>

<a href="/add" class="btn btn-success">
Add Complaint
</a>

</div>

<div class="row">

<div class="col-md-4">

<div class="card text-center">

<div class="card-body">

<h5>Total Complaints</h5>

<h1>{{total}}</h1>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-center">

<div class="card-body">

<h5>Resolved Complaints</h5>

<h1>{{resolved}}</h1>

</div>

</div>

</div>

<div class="col-md-4">

<div class="card text-center">

<div class="card-body">

<h5>Open Complaints</h5>

<h1>{{open_count}}</h1>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
