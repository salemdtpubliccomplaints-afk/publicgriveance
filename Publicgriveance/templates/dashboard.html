<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f5f5;
        }

        .banner-container{
            width:100%;
            background:#fff;
            text-align:center;
            margin:0;
            padding:0;
        }

        .banner-image{
            width:100%;
            max-height:180px;
            object-fit:contain;
            display:block;
            margin:0 auto;
        }

        .title-section{
            text-align:center;
            background:#fff;
            padding:4px 10px;
            border-bottom:1px solid #e5e5e5;
        }

        .title-tamil{
            color:#7a0019;
            font-size:20px;
            font-weight:700;
            margin:0;
        }

        .title-english{
            color:#555;
            font-size:13px;
            margin-top:3px;
        }

        .dashboard-card{
            background:white;
            border-radius:15px;
            padding:25px;
            margin-top:25px;
            box-shadow:0px 3px 10px rgba(0,0,0,0.15);
        }

        .dashboard-title{
            color:#7a0019;
            font-weight:800;
        }

        .count-card{
            border-radius:15px;
            padding:25px;
            color:white;
            text-align:center;
            box-shadow:0 3px 10px rgba(0,0,0,0.15);
        }

        .total-card{
            background:#0d6efd;
        }

        .open-card{
            background:#dc3545;
        }

        .resolved-card{
            background:#198754;
        }

        .count-number{
            font-size:42px;
            font-weight:800;
        }
    </style>
</head>

<body>

<div class="banner-container">
    <img
        src="{{ url_for('static', filename='images/banner.png') }}"
        class="banner-image"
        alt="Banner">
</div>

<div class="title-section">
    <div class="title-tamil">
        சேலம் தெற்கு (090) சட்ட மன்றத் தொகுதி - மக்கள் கோரிக்கைகள்
    </div>

    <div class="title-english">
        Public Complaint Monitoring & Tracking System
    </div>
</div>

<div class="container">

    <div class="dashboard-card">

        <h2 class="dashboard-title text-center mb-4">
            Public Grievance Dashboard
        </h2>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="count-card total-card">
                    <h4>Total Complaints</h4>
                    <div class="count-number">{{ total }}</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="count-card open-card">
                    <h4>Open Complaints</h4>
                    <div class="count-number">{{ open_count }}</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="count-card resolved-card">
                    <h4>Resolved Complaints</h4>
                    <div class="count-number">{{ resolved }}</div>
                </div>
            </div>

        </div>

        <div class="text-center mt-4">
            <a href="/" class="btn btn-secondary">
                Back
            </a>
        </div>

    </div>

</div>

</body>
</html>
