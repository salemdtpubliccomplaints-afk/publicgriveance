<!DOCTYPE html>
<html>
<head>

<title>Edit Complaint</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>Edit Complaint</h2>

<a href="/" class="btn btn-secondary mb-3">

Back

</a>

<form action="/update/{{row.id}}" method="POST">

<div class="row">

<div class="col-md-6">

<label>Citizen Name</label>

<input
type="text"
name="citizen_name"
class="form-control"
value="{{row.citizen_name}}">

</div>

<div class="col-md-6">

<label>Mobile</label>

<input
type="text"
name="mobile"
class="form-control"
value="{{row.mobile}}">

</div>

</div>

<br>

<div class="row">

<div class="col-md-6">

<label>Ward Number</label>

<input
type="text"
name="ward_no"
class="form-control"
value="{{row.ward_no}}">

</div>

<div class="col-md-6">

<label>Category</label>

<input
type="text"
name="category"
class="form-control"
value="{{row.category}}">

</div>

</div>

<br>

<label>Description</label>

<textarea
name="description"
class="form-control"
rows="5">{{row.description}}</textarea>

<br>

<button
type="submit"
class="btn btn-primary">

Update Complaint

</button>

</form>

</div>

</body>
</html>
