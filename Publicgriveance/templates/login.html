<!DOCTYPE html>
<html>

<head>
    <title>Makkaludan Naan - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #7a0019, #a50021, #ffcc00);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 420px;
            background: white;
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.35);
        }

        .login-logo {
            max-height: 180px;
            width: auto;
            border-radius: 14px;
            margin-bottom: 15px;
        }

        .login-title {
            color: #7a0019;
            font-weight: 800;
            text-align: center;
            font-size: 26px;
        }

        .login-subtitle {
            text-align: center;
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }

        label {
            font-weight: 600;
        }

        .form-control {
            border-radius: 10px;
        }

        .btn-login {
            background: #7a0019;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
        }

        .btn-login:hover {
            background: #5c0013;
            color: white;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="text-center">
        <img
            src="{{ url_for('static', filename='images/logo.png') }}"
            class="login-logo">
    </div>

    <div class="login-title">
        மக்களுடன் நான்
    </div>

    <div class="login-subtitle">
        Public Grievance Monitoring & Tracking System
    </div>

    <form action="/login" method="POST">

        <div class="mb-3">
            <label>Username</label>
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter username"
                required>
        </div>

        <div class="mb-3">
            <label>Password</label>
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter password"
                required>
        </div>

        <button type="submit" class="btn btn-login w-100">
            Login
        </button>

    </form>

</div>

</body>
</html>
